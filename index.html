<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=hello, initial-scale=1.0">
    <title>SignUp Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Signup</h1>
        <form id="form-container">
            <input type="text" placeholder="Full Name">
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <input type="password" placeholder="Confirm Password">
            <input type="text" placeholder="MM/DD/YYYY">
            
        
            <div id="radio-group">
                <label for="student"><input type="radio" name="role">Student</label>
                <label for="student"><input type="radio" name="role">Employee</label>
            </div>
            <div id="checkbox">
                <label for="terms"><input type="checkbox">I agree to all the Terms and conditions</label>
            </div>
            <button type="submit">Signup</button>
        </form>
    </div>
</body>
</html>
